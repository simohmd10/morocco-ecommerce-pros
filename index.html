<!-- ═══ Event Tracking ═══ -->
<script>
document.addEventListener("click", function(e) {
  const link = e.target.closest("a, button");
  if (!link) return;
  const text = link.innerText?.trim() || link.href || "unknown";
  window.dataLayer = window.dataLayer || [];

  if (link.href && link.href.includes("wa.me")) {
    dataLayer.push({ event: "whatsapp_click", label: text });
  }
  if (text.includes("Start") || text.includes("ابدأ") || text.includes("Lancez")) {
    dataLayer.push({ event: "cta_click", label: text });
  }
  if (text.includes("Visit") || text.includes("زيارة") || text.includes("Visiter")) {
    dataLayer.push({ event: "portfolio_click", label: text });
  }
});
</script>

<!-- ═══ Engagement Tracking ═══ -->
<script>
(function() {
  let scroll50 = false;
  let scroll90 = false;

  window.addEventListener("scroll", function() {
    const scroll = window.scrollY;
    const height = document.body.scrollHeight - window.innerHeight;
    const percent = scroll / height;
    window.dataLayer = window.dataLayer || [];

    if (percent > 0.5 && !scroll50) {
      scroll50 = true;
      dataLayer.push({ event: "scroll_50" });
    }
    if (percent > 0.9 && !scroll90) {
      scroll90 = true;
      dataLayer.push({ event: "scroll_90" });
    }
  });

  setTimeout(function() {
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ event: "engaged_30s" });
  }, 30000);
})();
</script>
