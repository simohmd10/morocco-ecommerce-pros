<body>
<script>
(function(){

function sendEvent(name,category,label){

  if(typeof gtag === "undefined") return;

  gtag("event",name,{
    event_category:category,
    event_label:label
  });

}

// Scroll tracking
let scroll50=false;
let scroll90=false;

window.addEventListener("scroll",function(){

  const scroll=window.scrollY;
  const height=document.body.scrollHeight-window.innerHeight;
  const percent=scroll/height;

  if(percent>0.5 && !scroll50){
    scroll50=true;
    sendEvent("scroll_50","engagement","half_page");
  }

  if(percent>0.9 && !scroll90){
    scroll90=true;
    sendEvent("scroll_90","engagement","almost_bottom");
  }

});

// Time on page
setTimeout(function(){
  sendEvent("engaged_30s","engagement","30_seconds");
},30000);

// Page visibility
document.addEventListener("visibilitychange",function(){

  if(document.visibilityState==="hidden"){
    sendEvent("leave_page","engagement","page_hidden");
  }

});

})();
</script>
