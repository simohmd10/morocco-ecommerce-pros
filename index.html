<!-- Click tracking -->
<script>
document.addEventListener("click", function(e) {

  const link = e.target.closest("a, button");
  if(!link) return;

  const text = link.innerText?.trim() || link.href || "unknown";

  if(typeof gtag === "undefined") return;

  if(link.href && link.href.includes("wa.me")){
    gtag("event","whatsapp_click",{event_category:"contact",event_label:text});
  }

  if(text.includes("Start") || text.includes("ابدأ")){
    gtag("event","cta_click",{event_category:"cta",event_label:text});
  }

  if(text.includes("Visit") || text.includes("زيارة")){
    gtag("event","portfolio_click",{event_category:"portfolio",event_label:text});
  }

});
</script>

<!-- Advanced analytics -->
<script>
(function(){

function sendEvent(name,category,label){

if(typeof gtag === "undefined") return;

gtag("event",name,{
event_category:category,
event_label:label
});

}

let scroll50=false;
let scroll90=false;

window.addEventListener("scroll",function(){

const scroll=window.scrollY;
const height=document.body.scrollHeight-window.innerHeight;
const percent=scroll/height;

if(percent>0.5 && !scroll50){
scroll50=true;
sendEvent("scroll_50","engagement","half_page");
}

if(percent>0.9 && !scroll90){
scroll90=true;
sendEvent("scroll_90","engagement","almost_bottom");
}

});

setTimeout(function(){
sendEvent("engaged_30s","engagement","30_seconds");
},30000);

})();
</script>
